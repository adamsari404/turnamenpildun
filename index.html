<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klasemen Turnamen Piala Dunia 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* --- General Styles --- */
        body {
            background-color: #0f0f11; /* Slightly darker background */
            color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container-box {
            max-width: 900px; /* Slightly narrower for better readability */
            margin: auto;
            padding: 30px 20px;
        }

        .title {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            color: #ffd700; /* Gold */
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
        }

        /* --- Carousel --- */
        .carousel {
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 40px;
        }

        .carousel-item img {
            width: 100%;
            height: auto;
            aspect-ratio: 21 / 9; /* Wider aspect ratio */
            object-fit: cover;
        }

        /* --- Dropdown Button --- */
        .main-dropdown-btn {
            background: linear-gradient(135deg, #FFD91A, #FFB300);
            color: #111;
            font-weight: 800;
            border: none;
            border-radius: 8px; /* Less rounded, more modern */
            padding: 16px 30px;
            font-size: 18px;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            box-shadow: 0 4px 15px rgba(255, 179, 0, 0.4);
            letter-spacing: 1px;
        }

        .main-dropdown-btn:hover, .main-dropdown-btn:focus {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 179, 0, 0.6);
            color: #000;
        }

        .dropdown-menu {
            background-color: #1a1a1d;
            border: 1px solid #333;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            padding: 10px 0;
            margin-top: 10px !important;
        }

        .dropdown-item {
            color: #fff;
            font-weight: 600;
            padding: 12px 20px;
            transition: background-color 0.2s;
            text-align: center;
        }

        .dropdown-item:hover {
            background-color: #2a2a2e;
        }

        /* Dropdown Item Colors */
        .dropdown-item.agent-link { color: #ff4d4d; }
        .dropdown-item.play-link { color: #4da6ff; }
        .dropdown-item.pools-link { color: #ffd700; }

        /* --- Search Sections --- */
        .search-section {
            display: none;
            animation: fadeIn 0.4s ease-in-out;
            margin-top: 40px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-header {
            text-align: center;
            font-weight: 800;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header-agent { color: #ff4d4d; text-shadow: 0 2px 10px rgba(255, 77, 77, 0.3); }
        .header-play { color: #4da6ff; text-shadow: 0 2px 10px rgba(77, 166, 255, 0.3); }
        .header-pools { color: #ffd700; text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3); }

        /* --- Search Boxes --- */
        .search-box {
            background: #1e1e24;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #2a2a35;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 25px;
            transition: transform 0.2s;
        }

        .search-box:hover {
            transform: translateY(-2px);
        }

        .search-box h4 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Form Controls */
        .form-control {
            background-color: #2a2a35;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
            padding: 12px 15px;
        }

        .form-control:focus {
            background-color: #333340;
            border-color: #ffd700;
            color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(255, 215, 0, 0.25);
        }

        .form-control::placeholder {
            color: #888;
        }

        /* Input Labels */
        .input-label {
            color: #aaa;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        /* Custom Buttons */
        .btn-search {
            font-weight: 700;
            padding: 12px 25px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Box Specific Accents */
        .box-pg { border-top: 3px solid #4da6ff; }
        .box-pragmatic { border-top: 3px solid #ffd700; }
        .box-agent { border-top: 3px solid #ff4d4d; }

        .text-pg { color: #4da6ff; }
        .text-pragmatic { color: #ffd700; }

        /* --- Results --- */
        .result-box {
            margin-top: 20px;
            padding: 20px;
            background: #25252b;
            border-radius: 8px;
            border-left: 4px solid #444; /* Default border */
            display: none;
        }
        
        .result-box.success-pg { border-left-color: #4da6ff; }
        .result-box.success-prag { border-left-color: #ffd700; }
        .result-box.success-agent { border-left-color: #ff4d4d; }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #333;
            font-size: 14px;
        }

        .result-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .result-label { color: #aaa; }
        .result-value { font-weight: 700; color: #fff; }
        .result-value.rank { color: #ffd700; }
        .result-value.turnover { color: #28a745; }

        /* --- History Section --- */
        .history-section {
            background: #1e1e24;
            padding: 40px 30px;
            border-radius: 12px;
            margin-top: 50px;
            border: 1px solid #2a2a35;
        }

        .history-title {
            color: #ffd700;
            text-align: center;
            font-weight: 800;
            margin-bottom: 30px;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* History Filters */
        .filter-label {
            background-color: #2a2a35;
            color: #aaa;
            border: 1px solid #444;
            font-weight: 600;
            font-size: 13px;
        }
        .filter-select {
            background-color: #1e1e24;
            color: #fff;
            border: 1px solid #444;
        }
        .filter-select:focus {
            border-color: #ffd700;
            box-shadow: none;
        }

        /* History Cards */
        .history-grid-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }

        .history-card {
            background: #25252b;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333;
            transition: transform 0.2s, background-color 0.2s;
        }

        .history-card:hover {
            background: #2a2a35;
            transform: translateX(4px);
        }

        .history-card.theme-pg { border-left: 4px solid #4da6ff; }
        .history-card.theme-prag { border-left: 4px solid #ffd700; }

        .history-info h5 {
            margin: 0 0 4px 0;
            color: #fff;
            font-weight: 700;
            font-size: 15px;
        }

        .history-info p {
            margin: 0;
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
        }

        .history-prize {
            font-size: 15px;
            font-weight: 800;
            color: #28a745;
            background: rgba(40, 167, 69, 0.1);
            padding: 6px 12px;
            border-radius: 6px;
        }
        
        .loading-text { color: #aaa; font-style: italic; }
        .error-text { color: #ff4d4d; }
        .warning-text { color: #ffd700; }

    </style>
</head>

<body>

<div class="container-box">

    <div class="title">
        🏆 Klasemen Turnamen Slot
    </div>

    <div id="promoCarousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="/assets/TURNAMEN-SLOT-303GROUP.png" alt="Promo Turnamen">
            </div>
            <div class="carousel-item">
                <a href="https://cutt.ly/pools303gacor" target="_blank">
                    <img src="/assets/Pools303-Terbaik.png" alt="Pools303">
                </a>
            </div>
            <div class="carousel-item">
                <a href="https://cutt.ly/play303gacor" target="_blank">
                    <img src="/assets/Play303-Terpercaya.png" alt="Play303">
                </a>
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#promoCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#promoCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>

    <!-- Dropdown Menu -->
    <div class="text-center mt-4">
        <div class="dropdown">
            <button class="btn main-dropdown-btn dropdown-toggle" type="button" id="dropdownEvent" data-bs-toggle="dropdown" aria-expanded="false">
                EVENT PIALA DUNIA 2026
            </button>
            <ul class="dropdown-menu w-100" style="max-width: 400px; margin: 0 auto;" aria-labelledby="dropdownEvent">
                <li><a class="dropdown-item agent-link" href="#" onclick="showSection('agent')">AGENT303</a></li>
                <li><a class="dropdown-item play-link" href="#" onclick="showSection('play')">PLAY303</a></li>
                <li><a class="dropdown-item pools-link" href="#" onclick="showSection('pools')">POOLS303</a></li>
            </ul>
        </div>
    </div>

    <!-- SECTION AGENT303 -->
    <div id="agent-section" class="search-section">
        <h2 class="section-header header-agent">AGENT303</h2>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="search-box box-agent">
                    <h4 class="text-agent text-center mb-4" style="color: #ff4d4d;">Cek Klasemen Personal</h4>
                    <div class="mb-3">
                        <label class="input-label">User ID</label>
                        <input type="text" id="agent-userid-input" class="form-control" placeholder="Masukkan User ID Anda">
                    </div>
                    <div class="mb-4">
                        <label class="input-label">Nama Terdaftar</label>
                        <input type="text" id="agent-name-input" class="form-control" placeholder="Masukkan Nama Anda">
                    </div>
                    <button class="btn btn-danger btn-search w-100" onclick="searchAgentData('AGENT303', 'agent-userid-input', 'agent-name-input', 'agent-result')">Cari Data</button>
                    <div id="agent-result" class="result-box success-agent"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- SECTION PLAY303 -->
    <div id="play-section" class="search-section">
        <h2 class="section-header header-play">PLAY303</h2>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="search-box box-pg">
                    <h4 class="text-pg">Cek Klasemen Personal</h4>
                    <div class="input-group">
                        <input type="text" id="play-input" class="form-control" placeholder="Username">
                        <button class="btn btn-primary fw-bold" onclick="searchData('PLAY303', 'play-input', 'play-result', 'success-pg')">Cari</button>
                    </div>
                    <div id="play-result" class="result-box"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- SECTION POOLS303 -->
    <div id="pools-section" class="search-section">
        <h2 class="section-header header-pools">POOLS303</h2>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="search-box box-pragmatic">
                    <h4 class="text-pragmatic">Cek Klasemen Personal</h4>
                    <div class="input-group">
                        <input type="text" id="pools-input" class="form-control" placeholder="Username">
                        <button class="btn btn-warning fw-bold text-dark" onclick="searchData('POOLS303', 'pools-input', 'pools-result', 'success-prag')">CARI</button>
                    </div>
                    <div id="pools-result" class="result-box"></div>
                </div>
            </div>
        </div>
    </div>    

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function showSection(section){
        document.getElementById('pools-section').style.display='none';
        document.getElementById('play-section').style.display='none';
        document.getElementById('agent-section').style.display='none';
        
        const target = document.getElementById(section + '-section');
        target.style.display='block';
        // Simple scroll to section
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // Helper function to render results consistently
    function renderResult(resultBox, htmlContent, themeClass = '') {
        resultBox.style.display = 'block';
        resultBox.className = 'result-box ' + themeClass;
        resultBox.innerHTML = htmlContent;
    }

    async function searchData(sheetName, inputId, resultId, themeClass) {
        const username = document.getElementById(inputId).value.trim().toLowerCase();
        const resultBox = document.getElementById(resultId);

        if(!username){
            renderResult(resultBox, `<span class="error-text">⚠️ Silakan masukkan username.</span>`);
            return;
        }

        renderResult(resultBox, `<span class="loading-text">Sedang mencari data... ⏳</span>`);

        try {
            const response = await fetch(`/api/search?sheet=${encodeURIComponent(sheetName)}`);
            if (!response.ok) throw new Error(`Server Error: ${response.status}`);
            
            const data = await response.json();
            const rows = data.values;

            if(data.error || !rows){
                renderResult(resultBox, `<span class="error-text">❌ Data tidak tersedia.</span>`);
                return;
            }

            let found = false;
            rows.forEach((row, index) => {
                if(index === 0) return; 
                
                const rank = row[0] || '-';
                const user = row[1] || '-';
                const turnover = formatRupiah(row[2]) || '-';

                if(user.toString().toLowerCase() === username){
                    found = true;
                    renderResult(resultBox, `
                        <div class="result-item">
                            <span class="result-label">Ranking</span>
                            <span class="result-value rank">#${rank}</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">Username</span>
                            <span class="result-value">${user}</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">Turnover</span>
                            <span class="result-value turnover">${turnover}</span>
                        </div>
                    `, themeClass);
                }
            });

            if(!found){
                renderResult(resultBox, `<span class="warning-text">⚠️ Username tidak ditemukan.</span>`);
            }
        } catch(error) {
            renderResult(resultBox, `<span class="error-text">Koneksi gagal. Coba lagi nanti.</span>`);
        }
    }

    async function searchAgentData(sheetName, userIdInputId, nameInputId, resultId) {
        const userId = document.getElementById(userIdInputId).value.trim().toLowerCase();
        const nameData = document.getElementById(nameInputId).value.trim().toLowerCase();
        const resultBox = document.getElementById(resultId);

        if(!userId || !nameData){
            renderResult(resultBox, `<span class="error-text">⚠️ Harap isi User ID dan Nama lengkap!</span>`);
            return;
        }

        renderResult(resultBox, `<span class="loading-text">Memverifikasi data... ⏳</span>`);

        try {
            const response = await fetch(`/api/search?sheet=${encodeURIComponent(sheetName)}`);
            if (!response.ok) throw new Error(`Server Error`);
            
            const data = await response.json();
            const rows = data.values;

            if(data.error || !rows){
                renderResult(resultBox, `<span class="error-text">❌ Data belum tersedia.</span>`);
                return;
            }

            let found = false;
            rows.forEach((row, index) => {
                if(index === 0) return; 

                const rank = row[0] || '-';
                const sheetUserId = (row[1] || '').toString().toLowerCase();
                const sheetName = (row[2] || '').toString().toLowerCase();
                const turnover = formatRupiah(row[3]) || '-';

                if(sheetUserId === userId && sheetName === nameData){
                    found = true;
                    renderResult(resultBox, `
                        <div class="result-item">
                            <span class="result-label">Ranking</span>
                            <span class="result-value rank">#${rank}</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">User ID</span>
                            <span class="result-value">${row[1]}</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">Nama</span>
                            <span class="result-value">${row[2]}</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">Turnover</span>
                            <span class="result-value turnover">${turnover}</span>
                        </div>
                    `, 'success-agent');
                }
            });

            if(!found){
                renderResult(resultBox, `<span class="warning-text">⚠️ Data tidak cocok. Periksa kembali inputan Anda.</span>`);
            }
        } catch(error) {
            renderResult(resultBox, `<span class="error-text">Terjadi kesalahan sistem.</span>`);
        }
    }

    /* History Logic */
    let cachedHistoryData = [];

    async function initHistoryData() {
        const statusBox = document.getElementById('history-status');
        const btnLoad = document.getElementById('btn-load-history');
        const filterBox = document.getElementById('history-filters');

        if(btnLoad) {
            btnLoad.disabled = true;
            btnLoad.innerHTML = 'Memuat Data...';
        }

        statusBox.innerHTML = `<span class="loading-text">Menyinkronkan data history...</span>`;

        try {
            const response = await fetch(`/api/history`);
            if (!response.ok) throw new Error();
            const data = await response.json();
            
            if (!data.values || data.values.length <= 1) {
                statusBox.innerHTML = `<span class="warning-text">Belum ada riwayat tercatat.</span>`;
                if(btnLoad) {
                    btnLoad.disabled = false;
                    btnLoad.innerHTML = 'Coba Lagi';
                }
                return;
            }

            cachedHistoryData = data.values.slice(1);
            statusBox.innerHTML = ''; 

            if(btnLoad) document.getElementById('history-action-container').style.display = 'none';
            if(filterBox) filterBox.style.display = 'flex';

            renderHistory();

        } catch (error) {
            statusBox.innerHTML = `<span class="error-text">Gagal memuat riwayat.</span>`;
            if(btnLoad) {
                btnLoad.disabled = false;
                btnLoad.innerHTML = 'Coba Muat Ulang';
            }
        }
    }

    function renderHistory() {
        const fBulan = document.getElementById('filterBulan').value;
        const fSitus = document.getElementById('filterSitus').value;
        const fProvider = document.getElementById('filterProvider').value;

        let poolsPgData = [], poolsPragData = [], playPgData = [], playPragData = [];

        cachedHistoryData.forEach(row => {
            const [bulan, situs, provider, ranking, username, hadiah] = row;
            const sBulan = (bulan || '').trim();
            const sSitus = (situs || '').trim().toUpperCase();
            const sProvider = (provider || '').trim().toUpperCase();

            if (sBulan === fBulan && (fSitus === 'SEMUA' || sSitus === fSitus) && (fProvider === 'SEMUA' || sProvider === fProvider)) {
                if (sSitus === 'POOLS303' && sProvider === 'PG SOFT') poolsPgData.push(row);
                if (sSitus === 'POOLS303' && sProvider === 'PRAGMATIC') poolsPragData.push(row);
                if (sSitus === 'PLAY303' && sProvider === 'PG SOFT') playPgData.push(row);
                if (sSitus === 'PLAY303' && sProvider === 'PRAGMATIC') playPragData.push(row);
            }
        });

        const buildHTML = (dataArray, themeClass) => {
            if (dataArray.length === 0) return `<p class="loading-text text-center mt-3">Tidak ada data.</p>`;
            return dataArray.slice(0, 10).map(row => `
                <div class="history-card ${themeClass}">
                    <div class="history-info">
                        <h5>#${row[3]} - ${row[4]}</h5>
                        <p>${row[1]} • ${row[2]}</p>
                    </div>
                    <div class="history-prize">${row[5]}</div>
                </div>
            `).join('');
        };

        document.getElementById('data-pools-pg').innerHTML = buildHTML(poolsPgData, 'theme-pg');
        document.getElementById('data-pools-prag').innerHTML = buildHTML(poolsPragData, 'theme-prag');
        document.getElementById('data-play-pg').innerHTML = buildHTML(playPgData, 'theme-pg');
        document.getElementById('data-play-prag').innerHTML = buildHTML(playPragData, 'theme-prag');

        document.getElementById('box-pools-pg').style.display = (fSitus !== 'PLAY303' && fProvider !== 'PRAGMATIC') ? 'block' : 'none';
        document.getElementById('box-pools-prag').style.display = (fSitus !== 'PLAY303' && fProvider !== 'PG SOFT') ? 'block' : 'none';
        document.getElementById('box-play-pg').style.display = (fSitus !== 'POOLS303' && fProvider !== 'PRAGMATIC') ? 'block' : 'none';
        document.getElementById('box-play-prag').style.display = (fSitus !== 'POOLS303' && fProvider !== 'PG SOFT') ? 'block' : 'none';
    }

    // Helper function to format IDR
    function formatRupiah(value) {
        if (!value || value === '-') return '-';
        
        // Bersihkan data dari karakter selain angka (antisipasi format bawaan Google Sheets)
        const cleanNumber = parseFloat(value.toString().replace(/[^0-9.-]+/g, ""));
        
        // Jika setelah dibersihkan hasilnya bukan angka (NaN), kembalikan teks aslinya
        if (isNaN(cleanNumber)) return value;

        // Gunakan standar internasional untuk format mata uang Indonesia
        return new Intl.NumberFormat('id-ID', {
            style: 'currency',
            currency: 'IDR',
            minimumFractionDigits: 0,
            maximumFractionDigits: 0
        }).format(cleanNumber);
    }
</script>

</body>
</html>
