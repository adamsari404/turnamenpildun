<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* --- General Styles --- */
        body {
            background-color: #0f0f11;
            color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container-box {
            max-width: 900px;
            margin: auto;
            padding: 30px 20px;
        }

        .title {
            text-align: center;
            font-size: 22px;
            font-weight: 800;
            color: #ffd700;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
        }

        /* --- Carousel --- */
        .carousel {
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 40px;
        }

        .carousel-item img {
            width: 100%;
            height: auto;
            object-fit: cover;
        }

        /* --- Dropdown Button --- */
        .main-dropdown-btn {
            background: linear-gradient(135deg, #FFD91A, #FFB300);

            font-weight: 800;
            border: none;
            border-radius: 8px;

            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 179, 0, 0.6);
            color: #000;
        }

        .dropdown-menu {
            background-color: #1a1a1d;
            border: 1px solid #333;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            padding: 10px 0;
            margin-top: 10px !important;

        .dropdown-item {
            color: #fff;
            font-weight: 600;
            padding: 12px 20px;

            text-align: center;
        }

        .dropdown-item:hover {

        }

        /* Dropdown Item Colors */
        .dropdown-item.agent-link { color: #2f5de4; }
        .dropdown-item.play-link { color: #4da6ff; }
        .dropdown-item.pools-link { color: #ffd700; }

        /* --- Search Sections --- */
        .search-section {
            display: none;
            animation: fadeIn 0.4s ease-in-out;
            margin-top: 40px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-header {
            text-align: center;
            font-weight: 800;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header-agent { color: #2f5de4; text-shadow: 0 2px 10px rgba(48, 166, 235, 0.281); }
        .header-play { color: #4da6ff; text-shadow: 0 2px 10px rgba(77, 166, 255, 0.3); }
        .header-pools { color: #ffd700; text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3); }

        /* --- Search Boxes --- */
        .search-box {
            background: #1e1e24;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #2a2a35;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 25px;
            transition: transform 0.2s;
        }

        .search-box:hover {
            transform: translateY(-2px);
        }

        .search-box h4 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Form Controls */
        .form-control {
            background-color: #2a2a35;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
            padding: 12px 15px;
        }

        .form-control:focus {
            background-color: #333340;
            border-color: #ffd700;
            color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(255, 215, 0, 0.25);
        }

        .form-control::placeholder {
            color: #888;
        }

        /* Input Labels */
        .input-label {
            color: #aaa;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        /* Custom Buttons */
        .btn-search {
            font-weight: 700;
            padding: 12px 25px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Box Specific Accents */
        .box-pg { border-top: 3px solid #4da6ff; }
        .box-pragmatic { border-top: 3px solid #ffd700; }
        .box-agent { border-top: 3px solid #1732ca; }

        .text-pg { color: #4da6ff; }
        .text-pragmatic { color: #ffd700; }

        /* --- Results --- */
        .result-box {
            margin-top: 20px;
            padding: 20px;
            background: #25252b;
            border-radius: 8px;
            border-left: 4px solid #444;
            display: none;
        }
        
        .result-box.success-pg { border-left-color: #4da6ff; }
        .result-box.success-prag { border-left-color: #ffd700; }
        .result-box.success-agent { border-left-color: #1732ca; }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #333;
            font-size: 14px;
        }

        .result-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .result-label { color: #aaa; }
        .result-value { font-weight: 700; color: #fff; }
        .result-value.rank { color: #ffd700; }
        .result-value.turnover { color: #28a745; }

        .loading-text { color: #aaa; font-style: italic; }
        .error-text { color: #1732ca; }
        .warning-text { color: #ffd700; }

    </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // --- 1. Fungsi Toggle Tampilan ---
    function showSection(section){
        // Daftar semua ID section (Klasemen + Referal)
        const sections = ['pools', 'play', 'agent', 'ref-pools', 'ref-play', 'ref-agent'];
        
        // Sembunyikan semua
        sections.forEach(s => {
            const el = document.getElementById(s + '-section');
            if(el) el.style.display = 'none';
        });
        
        // Tampilkan yang dipilih
        const target = document.getElementById(section + '-section');
        if(target) {
            target.style.display = 'block';
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    }

    // --- 2. Helper Functions ---
    function renderResult(resultBox, htmlContent, themeClass = '') {
        resultBox.style.display = 'block';
        resultBox.className = 'result-box ' + themeClass;
        resultBox.innerHTML = htmlContent;
    }

    function formatRupiah(value) {
        if (!value || value === '-') return '-';
        const cleanNumber = parseFloat(value.toString().replace(/[^0-9.-]+/g, ""));
        if (isNaN(cleanNumber)) return value;
        return new Intl.NumberFormat('id-ID', {
            style: 'currency',
            currency: 'IDR',
            minimumFractionDigits: 0,
            maximumFractionDigits: 0
        }).format(cleanNumber);
    }

    // --- 3. Fungsi Pencarian Klasemen Event ---
    async function searchData(sheetName, inputId, resultId, themeClass) {
        const username = document.getElementById(inputId).value.trim().toLowerCase();
        const resultBox = document.getElementById(resultId);

        if(!username){
            renderResult(resultBox, `<span class="error-text">⚠️ Silakan masukkan username.</span>`);
            return;
        }

        renderResult(resultBox, `<span class="loading-text">Sedang mencari data... ⏳</span>`);

        try {
            const response = await fetch(`/api/search?sheet=${encodeURIComponent(sheetName)}`);
            if (!response.ok) throw new Error(`Server Error: ${response.status}`);
            
            const data = await response.json();
            const rows = data.values;

            if(data.error || !rows){
                renderResult(resultBox, `<span class="error-text">❌ Data tidak tersedia.</span>`);
                return;
            }

            let foundCount = 0;
            let htmlContent = ''; 

            rows.forEach((row, index) => {
                if(index === 0) return; 
                
                const rank = row[0] || '-';
                const user = row[1] || '-';
                const turnover = formatRupiah(row[2]); 

                if(user.toString().toLowerCase().includes(username)){
                    foundCount++;
                    htmlContent += `
                        <div style="border-bottom: 1px dashed #444; padding-bottom: 10px; margin-bottom: 10px;">
                            <div class="result-item">
                                <span class="result-label">Ranking</span>
                                <span class="result-value rank">#${rank}</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">Username</span>
                                <span class="result-value">${user}</span>
                            </div>
                            <div class="result-item" style="border-bottom: none;">
                                <span class="result-label">Turnover</span>
                                <span class="result-value turnover">${turnover}</span>
                            </div>
                        </div>
                    `;
                }
            });

            if(foundCount > 0){
                renderResult(resultBox, htmlContent, themeClass);
            } else {
                renderResult(resultBox, `<span class="warning-text">⚠️ Username tidak ditemukan.</span>`);
            }
        } catch(error) {
            renderResult(resultBox, `<span class="error-text">Koneksi gagal. Coba lagi nanti.</span>`);
        }
    }

    async function searchAgentData(sheetName, userIdInputId, nameInputId, resultId) {
        const userId = document.getElementById(userIdInputId).value.trim().toLowerCase();
        const nameData = document.getElementById(nameInputId).value.trim().toLowerCase();
        const resultBox = document.getElementById(resultId);

        if(!userId || !nameData){
            renderResult(resultBox, `<span class="error-text">⚠️ Harap isi User ID dan Nama lengkap!</span>`);
            return;
        }

        renderResult(resultBox, `<span class="loading-text">Memverifikasi data... ⏳</span>`);

        try {
            const response = await fetch(`/api/search?sheet=${encodeURIComponent(sheetName)}`);
            if (!response.ok) throw new Error(`Server Error`);
            
            const data = await response.json();
            const rows = data.values;

            if(data.error || !rows){
                renderResult(resultBox, `<span class="error-text">❌ Data belum tersedia.</span>`);
                return;
            }

            let foundCount = 0;
            let htmlContent = ''; 

            rows.forEach((row, index) => {
                if(index === 0) return; 

                const rank = row[0] || '-';
                const sheetUserId = (row[1] || '').toString().toLowerCase();
                const sheetName = (row[2] || '').toString().toLowerCase();
                const turnover = formatRupiah(row[3]);

                if(sheetUserId.includes(userId) && sheetName.includes(nameData)){
                    foundCount++;
                    htmlContent += `
                        <div style="border-bottom: 1px dashed #444; padding-bottom: 10px; margin-bottom: 10px;">
                            <div class="result-item">
                                <span class="result-label">Ranking</span>
                                <span class="result-value rank">#${rank}</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">User ID</span>
                                <span class="result-value">${row[1]}</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">Nama</span>
                                <span class="result-value">${row[2]}</span>
                            </div>
                            <div class="result-item" style="border-bottom: none;">
                                <span class="result-label">Turnover</span>
                                <span class="result-value turnover">${turnover}</span>
                            </div>
                        </div>
                    `;
                }
            });

            if(foundCount > 0){
                renderResult(resultBox, htmlContent, 'success-agent');
            } else {
                renderResult(resultBox, `<span class="warning-text">⚠️ Data tidak cocok. Periksa kembali inputan Anda.</span>`);
            }
        } catch(error) {
            renderResult(resultBox, `<span class="error-text">Terjadi kesalahan sistem.</span>`);
        }
    }

    // --- 4. Fungsi Pencarian Referal ---
    async function searchReferralAgent() {
        const userId = document.getElementById('ref-agent-id-input').value.trim().toLowerCase();
        const nameData = document.getElementById('ref-agent-name-input').value.trim().toLowerCase();
        const resultBox = document.getElementById('ref-agent-result');

        if(!userId || !nameData){
            renderResult(resultBox, `<span class="error-text">⚠️ Harap isi ID REF dan Nama lengkap!</span>`);
            return;
        }

        renderResult(resultBox, `<span class="loading-text">Memverifikasi data referal... ⏳</span>`);

        try {
            const response = await fetch(`/api/search?sheet=REF AGENT303`);
            if (!response.ok) throw new Error(`Server Error`);
            
            const data = await response.json();
            const rows = data.values;

            if(data.error || !rows){
                renderResult(resultBox, `<span class="error-text">❌ Data belum tersedia.</span>`);
                return;
            }

            let foundCount = 0;
            let htmlContent = '';

            rows.forEach((row, index) => {
                if(index === 0) return;

                const sheetIdRef = (row[0] || '').toString().toLowerCase();
                const sheetName = (row[1] || '').toString().toLowerCase();
                const toRef = formatRupiah(row[2]);

                if(sheetIdRef.includes(userId) && sheetName.includes(nameData)){
                    foundCount++;
                    htmlContent += `
                        <div style="border-bottom: 1px dashed #444; padding-bottom: 10px; margin-bottom: 10px;">
                            <div class="result-item">
                                <span class="result-label">ID REF</span>
                                <span class="result-value">${row[0]}</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">Nama Terdaftar</span>
                                <span class="result-value">${row[1]}</span>
                            </div>
                            <div class="result-item" style="border-bottom: none;">
                                <span class="result-label">TOTAL TO REF</span>
                                <span class="result-value turnover">${toRef}</span>
                            </div>
                        </div>
                    `;
                }
            });

            if(foundCount > 0){
                renderResult(resultBox, htmlContent, 'success-agent');
            } else {
                renderResult(resultBox, `<span class="warning-text">⚠️ Data referal tidak ditemukan.</span>`);
            }
        } catch(error) {
            renderResult(resultBox, `<span class="error-text">Terjadi kesalahan sistem.</span>`);
        }
    }

    async function searchReferral(sheetName, inputId, resultId, themeClass) {
        const idRef = document.getElementById(inputId).value.trim().toLowerCase();
        const resultBox = document.getElementById(resultId);

        if(!idRef){
            renderResult(resultBox, `<span class="error-text">⚠️ Silakan masukkan ID REF.</span>`);
            return;
        }

        renderResult(resultBox, `<span class="loading-text">Sedang mencari data referal... ⏳</span>`);

        try {
            const response = await fetch(`/api/search?sheet=${encodeURIComponent(sheetName)}`);
            if (!response.ok) throw new Error();
            
            const data = await response.json();
            const rows = data.values;

            if(data.error || !rows){
                renderResult(resultBox, `<span class="error-text">❌ Data tidak tersedia.</span>`);
                return;
            }

            let foundCount = 0;
            let htmlContent = '';

            rows.forEach((row, index) => {
                if(index === 0) return;
                
                const sheetIdRef = (row[0] || '').toString().toLowerCase();
                const toRef = formatRupiah(row[1]);

                if(sheetIdRef.includes(idRef)){
                    foundCount++;
                    htmlContent += `
                        <div style="border-bottom: 1px dashed #444; padding-bottom: 10px; margin-bottom: 10px;">
                            <div class="result-item">
                                <span class="result-label">ID REF</span>
                                <span class="result-value">${row[0]}</span>
                            </div>
                            <div class="result-item" style="border-bottom: none;">
                                <span class="result-label">TOTAL TO REF</span>
                                <span class="result-value turnover">${toRef}</span>
                            </div>
                        </div>
                    `;
                }
            });

            if(foundCount > 0){
                renderResult(resultBox, htmlContent, themeClass);
            } else {
                renderResult(resultBox, `<span class="warning-text">⚠️ ID REF tidak ditemukan.</span>`);
            }
        } catch(error) {
            renderResult(resultBox, `<span class="error-text">Koneksi gagal. Coba lagi nanti.</span>`);
        }
    }

    // --- 5. Fungsi Audio ---
    var bgMusic = document.getElementById("bgMusic");
    var btnMusic = document.getElementById("btnMusic");
    var isPlaying = false; 

    function toggleMusic() {
        if (isPlaying) {
            bgMusic.pause(); 
            btnMusic.innerHTML = "🔇"; 
            isPlaying = false;
        } else {
            bgMusic.play(); 
            btnMusic.innerHTML = "🔊"; 
            isPlaying = true;
        }
    }

    btnMusic.addEventListener("click", function(event) {
        toggleMusic();
        event.stopPropagation();
    });
</script>

</body>
