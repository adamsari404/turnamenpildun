<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klasemen Turnamen Slot</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        @media (min-width: 768px) {
            .desktop-btn-large {
                padding: 15px 40px !important;
                font-size: 20px !important;
                min-width: 250px !important;
                margin: 15px !important;
            }
        }
        body{
            background:#111;
            color:white;
            font-family:Segoe UI;
        }
        /* Pengaturan ukuran gambar slider 800x800 */
        .carousel-item img {
            width: 100%;
            height: auto;
            max-width: 800px;
            margin: 0 auto;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 10px;
        }
        .carousel {
            max-width: 800px;
            margin: 20px auto;
        }
        .container-box{
            max-width:1000px;
            margin:auto;
            padding:20px;
        }

        .title{
            text-align:center;
            font-size:20px;
            font-weight:bold;
            color:#ffc107;
            margin-bottom:30px;
        }

        .main-btn{
            padding:9px 18px;
            border:none;
            border-radius:50px;
            font-size:15px;
            font-weight:bold;
            margin:8px;
            transition:0.3s;
            justify-content: center;
            min-width: 150px;
        }

        .main-btn:hover{
            transform:scale(1.05);
        }

        .btn-pools{
            background:linear-gradient(45deg,#FFD91A,#FFB300);
            color:black;
        }

        .btn-play{
            background:linear-gradient(45deg,#001AFF,#003CFF);
            color:white;
        }

        .search-section{
            display:none;
            background:#222;
            padding:20px;
            border-radius:15px;
            margin-top:30px;
        }

        .search-box{
            background:#333;
            padding:20px;
            border-radius:10px;
            margin-bottom:20px;
        }

        .result-box{
            margin-top:15px;
            padding:15px;
            background:#444;
            border-radius:10px;
            display:none;
        }

        .result-item{
            padding:10px 0;
            border-bottom:1px solid #666;
        }

        .result-item span{
            color:#ffc107;
            font-weight:bold;
        }

        /* ==========================================
           CSS HISTORY JUARA
           ========================================== */
        .history-section {
            background: #222;
            padding: 30px;
            border-radius: 15px;
            margin-top: 10px;
            margin-bottom: 20px;
            border: 1px solid #444;
        }

        .history-title {
            color: #ffc107;
            text-align: center;
            font-weight: bold;
            margin-bottom: 25px;
            font-size: 15px;
            letter-spacing: 1px;
        }

        .history-card {
            background: #333;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid #ffc107; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .history-card:hover {
            background: #444;
            transform: translateX(5px);
        }

        .history-card.play-theme {
            border-left: 5px solid #001AFF; 
        }

        .history-info h5 {
            margin: 0 0 5px 0;
            color: white;
            font-weight: bold;
            font-size: 16px;
        }

        .history-info p {
            margin: 0;
            color: #aaa;
            font-size: 13px;
        }

        .history-prize {
            font-size: 18px;
            font-weight: bold;
            color: #28a745; 
            background: rgba(40, 167, 69, 0.1);
            padding: 5px 10px;
            border-radius: 8px;
        }

    </style>

</head>

<body>

<div class="container-box">

    <div class="title">
        🏆 KLASEMEN TURNAMEN SLOT
    </div>

    <div id="promoCarousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="/assets/TURNAMEN-SLOT-303GROUP.png" alt="Slide 1">
            </div>
            <div class="carousel-item">
                <a href="https://cutt.ly/pools303gacor">
                    <img src="/assets/Pools303-Terbaik.png" alt="Slide 2">
                </a>
            </div>
            <div class="carousel-item">
                <a href="https://cutt.ly/play303gacor">
                    <img src="/assets/Play303-Terpercaya.png" alt="Slide 3">
                </a>
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#promoCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Sebelumnya</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#promoCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Berikutnya</span>
        </button>
    </div>

    <div class="d-flex gap-3 justify-content-center text-center" role="group">
        <button class="main-btn btn-pools desktop-btn-large" onclick="showSection('pools')">
            POOLS303
        </button>
        <button class="main-btn btn-play desktop-btn-large" onclick="showSection('play')">
           PLAY303
        </button>
        <button class="main-btn desktop-btn-large" onclick="showSection('agent')" style="background:linear-gradient(45deg,#FF0000,#990000); color:white;">
           AGENT303
        </button>
    </div>

    <div id="pools-section" class="search-section">
        <h2 class="text-center text-white mb-4">POOLS303</h2>
        <div class="row">
            <div class="col-md-6">
                <div class="search-box">
                    <h4 class="text-white">PG SOFT</h4>
                    <div class="input-group">
                        <input type="text" id="pools-pg-input" class="form-control" placeholder="Masukkan Username">
                        <button class="btn btn-primary" onclick="searchData('PG SOFT POOLS303', 'pools-pg-input', 'pools-pg-result')">Cari</button>
                    </div>
                    <div id="pools-pg-result" class="result-box"></div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="search-box">
                    <h4 class="text-warning">PRAGMATIC</h4>
                    <div class="input-group">
                        <input type="text" id="pools-prag-input" class="form-control" placeholder="Masukkan Username">
                        <button class="btn btn-warning" onclick="searchData('PRAGMATIC POOLS303', 'pools-prag-input', 'pools-prag-result')">Cari</button>
                    </div>
                    <div id="pools-prag-result" class="result-box"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="play-section" class="search-section">
        <h2 class="text-white text-center mb-4">PLAY303</h2>
        <div class="row">
            <div class="col-md-6">
                <div class="search-box">
                    <h4 class="text-white">PG SOFT</h4>
                    <div class="input-group">
                        <input type="text" id="play-pg-input" class="form-control" placeholder="Masukkan Username">
                        <button class="btn btn-primary" onclick="searchData('PG SOFT PLAY303', 'play-pg-input', 'play-pg-result')">Cari</button>
                    </div>
                    <div id="play-pg-result" class="result-box"></div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="search-box">
                    <h4 class="text-warning">PRAGMATIC</h4>
                    <div class="input-group">
                        <input type="text" id="play-prag-input" class="form-control" placeholder="Masukkan Username">
                        <button class="btn btn-warning" onclick="searchData('PRAGMATIC PLAY303', 'play-prag-input', 'play-prag-result')">Cari</button>
                    </div>
                    <div id="play-prag-result" class="result-box"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="agent-section" class="search-section">
        <h2 class="text-white text-center mb-4">AGENT303</h2>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="search-box">
                    <h4 class="text-danger mb-3">Cek Klasemen</h4>
                    <div class="mb-3">
                        <label class="text-white-50 small mb-1">UserID</label>
                        <input type="text" id="agent-userid-input" class="form-control" placeholder="Masukkan UserID">
                    </div>
                    <div class="mb-3">
                        <label class="text-white-50 small mb-1">Nama</label>
                        <input type="text" id="agent-name-input" class="form-control" placeholder="Masukkan Nama Terdaftar">
                    </div>
                    <button class="btn btn-danger w-100 fw-bold" onclick="searchAgentData('AGENT303', 'agent-userid-input', 'agent-name-input', 'agent-result')">CARI DATA</button>
                    <div id="agent-result" class="result-box"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="history-section">
        <div class="history-title">
            📜 RIWAYAT JUARA SEBELUMNYA
        </div>

        <div class="text-center mb-4" id="history-action-container">
            <button id="btn-load-history" class="btn btn-outline-warning fw-bold px-4 py-2" onclick="initHistoryData()">
                Muat Riwayat Juara 🔄
            </button>
        </div>

        <div class="row justify-content-center mb-4" id="history-filters" style="display: none;">
            <div class="col-md-4 mb-2">
                <div class="input-group">
                    <label class="input-group-text bg-dark text-white border-secondary" for="filterBulan">Bulan</label>
                    <select class="form-select bg-dark text-warning border-secondary" id="filterBulan" onchange="renderHistory()">
                        <option value="Jan 2026">Jan 2026</option>
                        <option value="Feb 2026">Feb 2026</option>
                        <option value="Mar 2026">Mar 2026</option>
                        <option value="Apr 2026">Apr 2026</option>
                        <option value="Mei 2026" selected>Mei 2026</option>
                        <option value="Jun 2026">Jun 2026</option>
                        <option value="Jul 2026">Jul 2026</option>
                        <option value="Aug 2026">Aug 2026</option>
                        <option value="Sep 2026">Sep 2026</option>
                    </select>
                </div>
            </div>
            <div class="col-md-4 mb-2">
                <div class="input-group">
                    <label class="input-group-text bg-dark text-white border-secondary" for="filterSitus">Situs</label>
                    <select class="form-select bg-dark text-warning border-secondary" id="filterSitus" onchange="renderHistory()">
                        <option value="SEMUA">Semua Situs</option>
                        <option value="POOLS303">POOLS303</option>
                        <option value="PLAY303">PLAY303</option>
                    </select>
                </div>
            </div>
            <div class="col-md-4 mb-2">
                <div class="input-group">
                    <label class="input-group-text bg-dark text-white border-secondary" for="filterProvider">Provider</label>
                    <select class="form-select bg-dark text-warning border-secondary" id="filterProvider" onchange="renderHistory()">
                        <option value="SEMUA">Semua Provider</option>
                        <option value="PG SOFT">PG Soft</option>
                        <option value="PRAGMATIC">Pragmatic</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="history-status" class="text-center mb-3"></div>

        <div class="row">
            <div class="col-md-6 mb-4" id="box-pools-pg" style="display:none;">
                <h5 class="text-warning text-center mb-3 fw-bold border-bottom border-warning pb-2">🏆 POOLS303 - PG SOFT</h5>
                <div id="data-pools-pg"></div>
            </div>

            <div class="col-md-6 mb-4" id="box-pools-prag" style="display:none;">
                <h5 class="text-warning text-center mb-3 fw-bold border-bottom border-warning pb-2">🏆 POOLS303 - PRAGMATIC</h5>
                <div id="data-pools-prag"></div>
            </div>

            <div class="col-md-6 mb-4" id="box-play-pg" style="display:none;">
                <h5 class="text-primary text-center mb-3 fw-bold border-bottom border-primary pb-2">🏆 PLAY303 - PG SOFT</h5>
                <div id="data-play-pg"></div>
            </div>

            <div class="col-md-6 mb-4" id="box-play-prag" style="display:none;">
                <h5 class="text-primary text-center mb-3 fw-bold border-bottom border-primary pb-2">🏆 PLAY303 - PRAGMATIC</h5>
                <div id="data-play-prag"></div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>

    /*
    ==========================================
    SHOW SECTION TABS
    ==========================================
    */
    function showSection(section){
        document.getElementById('pools-section').style.display='none';
        document.getElementById('play-section').style.display='none';
        document.getElementById('agent-section').style.display='none';
        document.getElementById(section + '-section').style.display='block';
    }

    /*
    ==========================================
    SEARCH DATA (VIA CLOUDFLARE PROXY)
    ==========================================
    */
    async function searchData(sheetName, inputId, resultId) {
        const username = document.getElementById(inputId).value.trim().toLowerCase();
        const resultBox = document.getElementById(resultId);

        if(!username){
            resultBox.style.display='block';
            resultBox.innerHTML=`<span class="text-danger">Silakan masukkan username.</span>`;
            return;
        }

        resultBox.style.display='block';
        resultBox.innerHTML=`<span class="text-light">Sedang mencari data... ⏳</span>`;

        try {
            const url = `/api/search?sheet=${encodeURIComponent(sheetName)}`;
            const response = await fetch(url);

            if (!response.ok) throw new Error(`Server Error: ${response.status}`);

            const contentType = response.headers.get("content-type");
            if (!contentType || !contentType.includes("application/json")) {
                throw new TypeError("Sistem menerima format HTML/Teks, bukan JSON.");
            }

            const data = await response.json();
            const rows = data.values;

            if(data.error || !rows){
                resultBox.innerHTML=`<span class="text-danger">Data sheet kosong atau parameter salah.</span>`;
                return;
            }

            let found = false;
            rows.forEach((row, index) => {
                if(index === 0) return; 

                const rank = row[0] || '-';
                const user = row[1] || '-';
                const turnover = row[2] || '-';

                if(user.toString().toLowerCase() === username){
                    found = true;
                    resultBox.innerHTML=`
                        <div class="result-item">Ranking: <span>${rank}</span></div>
                        <div class="result-item">Username: <span>${user}</span></div>
                        <div class="result-item border-0">Turnover: <span class="text-success">${turnover}</span></div>
                    `;
                }
            });

            if(!found){
                resultBox.innerHTML=`<span class="text-warning">Username tidak ditemukan.</span>`;
            }

        } catch(error) {
            resultBox.innerHTML=`
                <span class="text-danger">
                    Gagal menghubungi server database.<br>
                    <small>${error.message}</small>
                </span>
            `;
        }
    }

    async function searchAgentData(sheetName, userIdInputId, nameInputId, resultId) {
        // Mengambil dan membersihkan nilai dari kedua input
        const userId = document.getElementById(userIdInputId).value.trim().toLowerCase();
        const nameData = document.getElementById(nameInputId).value.trim().toLowerCase();
        const resultBox = document.getElementById(resultId);

        // Validasi: Wajib isi kedua kolom
        if(!userId || !nameData){
            resultBox.style.display='block';
            resultBox.innerHTML=`<span class="text-danger">⚠️ Harap masukkan UserID dan Nama dengan lengkap!</span>`;
            return;
        }

        resultBox.style.display='block';
        resultBox.innerHTML=`<span class="text-light">Sedang mencari data... ⏳</span>`;

        try {
            const url = `/api/search?sheet=${encodeURIComponent(sheetName)}`;
            const response = await fetch(url);

            if (!response.ok) throw new Error(`Server Error: ${response.status}`);
            
            const data = await response.json();
            const rows = data.values;

            if(data.error || !rows){
                resultBox.innerHTML=`<span class="text-danger">Data sheet kosong.</span>`;
                return;
            }

            let found = false;
            
            // Looping data dari Google Sheets
            rows.forEach((row, index) => {
                if(index === 0) return; // Lewati header tabel

                // Asumsi indeks kolom: 0=Rank, 1=UserID, 2=Name, 3=Turnover
                const rank = row[0] || '-';
                const sheetUserId = (row[1] || '').toString().toLowerCase();
                const sheetName = (row[2] || '').toString().toLowerCase();
                const turnover = row[3] || '-';

                // Cocokkan KEDUA data (UserID DAN Name harus sama persis)
                if(sheetUserId === userId && sheetName === nameData){
                    found = true;
                    resultBox.innerHTML=`
                        <div class="result-item">Ranking: <span>${rank}</span></div>
                        <div class="result-item">UserID: <span class="text-white">${row[1]}</span></div>
                        <div class="result-item">Name: <span class="text-white">${row[2]}</span></div>
                        <div class="result-item border-0">Turnover: <span class="text-success">${turnover}</span></div>
                    `;
                }
            });

            if(!found){
                resultBox.innerHTML=`<span class="text-warning">❌ Data tidak ditemukan. Pastikan UserID dan Nama sudah benar.</span>`;
            }

        } catch(error) {
            resultBox.innerHTML=`<span class="text-danger">Gagal menghubungi server.<br><small>${error.message}</small></span>`;
        }
    }
    

    /*
    ==========================================
    STATE MANAGEMENT & HISTORY LOGIC
    ==========================================
    */
    let cachedHistoryData = [];

    async function initHistoryData() {
        const statusBox = document.getElementById('history-status');
        const btnLoad = document.getElementById('btn-load-history');
        const filterBox = document.getElementById('history-filters');

        // 1. Ubah tombol menjadi status Loading
        if(btnLoad) {
            btnLoad.disabled = true;
            btnLoad.innerHTML = 'Memuat Data... ⏳';
        }

        statusBox.innerHTML = `<span class="text-info">Menghubungkan ke Database Server... ⏳</span>`;

        try {
            const url = `/api/history`; 
            const response = await fetch(url);
            
            if (!response.ok) throw new Error(`Server Error: ${response.status}`);

            const contentType = response.headers.get("content-type");
            if (!contentType || !contentType.includes("application/json")) {
                throw new TypeError("Sistem menerima format HTML/Teks, bukan JSON.");
            }

            const data = await response.json();
            
            if (!data.values || data.values.length <= 1) {
                statusBox.innerHTML = `<span class="text-warning">Belum ada data di sheet HISTORY_JUARA.</span>`;
                if(btnLoad) {
                    btnLoad.disabled = false;
                    btnLoad.innerHTML = 'Muat Ulang 🔄';
                }
                return;
            }

            cachedHistoryData = data.values.slice(1);
            statusBox.innerHTML = ''; 

            // 2. Sembunyikan tombol & Tampilkan filter setelah sukses
            if(btnLoad) document.getElementById('history-action-container').style.display = 'none';
            if(filterBox) filterBox.style.display = 'flex';

            renderHistory();

        } catch (error) {
            statusBox.innerHTML = `<span class="text-danger">Gagal memuat database riwayat:<br><small>${error.message}</small></span>`;
            
            // 3. Kembalikan tombol jika error agar bisa dicoba lagi
            if(btnLoad) {
                btnLoad.disabled = false;
                btnLoad.innerHTML = 'Coba Lagi 🔄';
            }
        }
    }

    function renderHistory() {
        const fBulan = document.getElementById('filterBulan').value;
        const fSitus = document.getElementById('filterSitus').value;
        const fProvider = document.getElementById('filterProvider').value;

        let poolsPgData = [];
        let poolsPragData = [];
        let playPgData = [];
        let playPragData = [];

        cachedHistoryData.forEach(row => {
            const [bulan, situs, provider, ranking, username, hadiah] = row;

            const sBulan = (bulan || '').trim();
            const sSitus = (situs || '').trim().toUpperCase();
            const sProvider = (provider || '').trim().toUpperCase();

            const matchBulan = sBulan === fBulan;
            const matchSitus = fSitus === 'SEMUA' || sSitus === fSitus;
            const matchProvider = fProvider === 'SEMUA' || sProvider === fProvider;

            if (matchBulan && matchSitus && matchProvider) {
                if (sSitus === 'POOLS303' && sProvider === 'PG SOFT') poolsPgData.push(row);
                if (sSitus === 'POOLS303' && sProvider === 'PRAGMATIC') poolsPragData.push(row);
                if (sSitus === 'PLAY303' && sProvider === 'PG SOFT') playPgData.push(row);
                if (sSitus === 'PLAY303' && sProvider === 'PRAGMATIC') playPragData.push(row);
            }
        });

        const buildHTML = (dataArray, themeClass) => {
            if (dataArray.length === 0) return `<p class="text-center text-secondary">Tidak ada data.</p>`;
            
            const limitedData = dataArray.slice(0, 10);
            
            return limitedData.map(row => {
                const [bulan, situs, provider, ranking, username, hadiah] = row;
                return `
                    <div class="history-card ${themeClass}">
                        <div class="history-info">
                            <h5>${ranking}. ${username}</h5>
                            <p>${situs} | ${provider}</p>
                        </div>
                        <div class="history-prize">${hadiah}</div>
                    </div>
                `;
            }).join('');
        };

        document.getElementById('data-pools-pg').innerHTML = buildHTML(poolsPgData, '');
        document.getElementById('data-pools-prag').innerHTML = buildHTML(poolsPragData, '');
        document.getElementById('data-play-pg').innerHTML = buildHTML(playPgData, 'play-theme');
        document.getElementById('data-play-prag').innerHTML = buildHTML(playPragData, 'play-theme');

        document.getElementById('box-pools-pg').style.display = (fSitus !== 'PLAY303' && fProvider !== 'PRAGMATIC') ? 'block' : 'none';
        document.getElementById('box-pools-prag').style.display = (fSitus !== 'PLAY303' && fProvider !== 'PG SOFT') ? 'block' : 'none';
        document.getElementById('box-play-pg').style.display = (fSitus !== 'POOLS303' && fProvider !== 'PRAGMATIC') ? 'block' : 'none';
        document.getElementById('box-play-prag').style.display = (fSitus !== 'POOLS303' && fProvider !== 'PG SOFT') ? 'block' : 'none';
    }

    // Biarkan kosong, jangan jalankan auto-fetch
    document.addEventListener('DOMContentLoaded', () => {
        // UI Menunggu interaksi tombol "Muat Riwayat"
    });

</script>

</body>
</html>
